services:
  - type: web
    name: ready-worldcup-telegram-bot
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: BOT_TOKEN
        sync: false
      - key: FOOTBALL_API_KEY
        sync: false
      - key: WORLD_CUP_LEAGUE_ID
        value: 1
      - key: WORLD_CUP_SEASON
        value: 2026
      - key: TZ
        value: Europe/Riga
      - key: ADMIN_ONLY_SETTINGS
        value: true